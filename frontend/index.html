<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Couch Rivals — Your Living Room Just Got a Stadium Upgrade</title>
  <meta name="theme-color" content="#0a0e17">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/room.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="dark-theme">
  <main id="app">
    <h1>Couch Rivals</h1>
    <p>Loading application...</p>
  <div id="celebration-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999;"></div>
  <canvas id="bg-canvas"></canvas>
  
  <!-- Hidden YouTube Player for legal hackathon music streaming -->
  <div id="yt-player" style="position: absolute; top: -9999px; left: -9999px;"></div>

  <!-- Minimal Floating Music UI -->
  <div id="music-player" style="position:fixed; top:1rem; right:1rem; background:var(--glass-bg); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:30px; padding:0.5rem 1rem; display:flex; align-items:center; gap:0.8rem; z-index:9000; box-shadow:0 4px 15px rgba(0,0,0,0.5); cursor:pointer;">
    <div style="width:24px; height:24px; border-radius:50%; background:var(--accent-cyan); display:flex; align-items:center; justify-content:center; color:#000; font-size:0.8rem;">🎵</div>
    <div style="display:flex; flex-direction:column;">
      <span style="font-family:'Rajdhani'; font-size:0.7rem; color:var(--accent-cyan); text-transform:uppercase; letter-spacing:1px; line-height:1;">Hackathon Mix</span>
      <span id="track-name" style="font-size:0.8rem; font-weight:bold; max-width:120px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">FIFA World Cup</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
  <script src="js/config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
